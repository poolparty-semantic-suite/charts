# Unique index name prefix for this PoolParty instance.
# Must be set (together with or instead of POOLPARTY_ELASTICSEARCH_INDEX_SUFFIX) when multiple PoolParty
# instances share the same Elasticsearch cluster, so that each instance operates on its own set of indices.
properties:
  # Example: "instance1-" turns "conceptdata" into "instance1-conceptdata".
  POOLPARTY_ELASTICSEARCH_INDEX_PREFIX: ""
  # Can be used together with POOLPARTY_ELASTICSEARCH_INDEX_PREFIX.
  # Example: "-v1" turns "conceptdata" into "conceptdata-v1".
  POOLPARTY_ELASTICSEARCH_INDEX_SUFFIX: ""
