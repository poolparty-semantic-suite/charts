apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ include "unified-views.fullname" . }}
  namespace: {{ include "unified-views.namespace" . }}
  labels:
    {{- include "unified-views.labels" . | nindent 4 }}
  {{- with .Values.annotations }}
  annotations:
    {{- tpl (toYaml .) $ | nindent 4 }}
  {{- end }}
spec:
  replicas: 1
  serviceName: {{ include "unified-views.fullname" . }}
  updateStrategy: {{ .Values.updateStrategy | toYaml | nindent 4 }}
  podManagementPolicy: {{ .Values.podManagementPolicy }}
  revisionHistoryLimit: {{ .Values.revisionHistoryLimit }}
  persistentVolumeClaimRetentionPolicy: {{ .Values.persistence.volumeClaimRetentionPolicy | toYaml | nindent 4 }}
  selector:
    matchLabels:
      {{- include "unified-views.selectorLabels" . | nindent 6 }}
  {{- if or .Values.persistence.enabled .Values.extraVolumeClaimTemplates }}
  volumeClaimTemplates:
    {{- if .Values.persistence.enabled }}
    - metadata:
        name: {{ .Values.persistence.volumeClaimTemplate.name }}
        {{- with .Values.persistence.volumeClaimTemplate.labels }}
        labels: {{ tpl (toYaml .) $ | nindent 10 }}
        {{- end }}
        {{- with .Values.persistence.volumeClaimTemplate.annotations }}
        annotations: {{ tpl (toYaml .) $ | nindent 10 }}
        {{- end }}
      spec:
        {{- toYaml .Values.persistence.volumeClaimTemplate.spec | nindent 8 }}
    {{- end }}
    - metadata:
        name: tomcat
      spec:
        accessModes: [ "ReadWriteOnce" ]
        resources:
          requests:
            storage: 2Gi
    {{- with .Values.extraVolumeClaimTemplates }}
      {{- tpl (toYaml .) $ | nindent 4 }}
    {{- end }}
  {{- end }}
  template:
    metadata:
      labels:
        {{- include "unified-views.selectorLabels" . | nindent 8 }}
        {{- with .Values.podLabels }}
          {{- tpl (toYaml .) $ | nindent 8 }}
        {{- end }}
      annotations:
        checksum/configmap-environment: {{ include (print .Template.BasePath "/uv/configmap-environment.yaml") . | sha256sum }}
        checksum/config-properties: {{ include (print .Template.BasePath "/uv/config-properties.yaml") . | sha256sum }}
        {{- with .Values.podAnnotations }}
          {{- tpl (toYaml .) $ | nindent 8 }}
        {{- end }}
    spec:
      terminationGracePeriodSeconds: {{ .Values.terminationGracePeriodSeconds }}
      serviceAccountName: {{ include "unified-views.serviceAccountName" . }}
      automountServiceAccountToken: {{ .Values.automountServiceAccountToken }}
      {{- if .Values.schedulerName }}
      schedulerName: {{ .Values.schedulerName }}
      {{- end }}
      {{- with .Values.dnsConfig }}
      dnsConfig: {{ toYaml . | nindent 8 }}
      {{- end }}
      {{- if .Values.dnsPolicy }}
      dnsPolicy: {{ .Values.dnsPolicy }}
      {{- end }}
      {{- if .Values.priorityClassName }}
      priorityClassName: {{ .Values.priorityClassName }}
      {{- end }}
      volumes:
        {{- if not .Values.persistence.enabled }}
        - name: {{ .Values.persistence.volumeClaimTemplate.name }}
        {{- end }}
        - name: tomcat
        {{- if .Values.tempVolume.enabled }}
        - name: temp-dir
          emptyDir: {{ .Values.tempVolume.emptyDir | toYaml | nindent 12 }}
        {{- end }}
        {{- if .Values.configuration.logback.existingConfigmap }}
        - name: unifiedviews-logback-config
          configMap:
            name: {{ tpl .Values.configuration.logback.existingConfigmap . }}
        {{- end }}
        {{- if .Values.license.existingSecret }}
        - name: uv-license
          secret:
            secretName: {{ tpl .Values.license.existingSecret . }}
            optional: {{ .Values.license.optional }}
        {{- end }}
        - name: uv-properties
          configMap:
            name: {{ include "unified-views.fullname.configmap.properties" . }}
        {{- with .Values.extraVolumes }}
          {{- tpl (toYaml .) $ | nindent 8 }}
        {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector: {{- tpl (toYaml .) $ | nindent 8 }}
      {{- end }}
      {{- if or .Values.affinity .Values.podAntiAffinity.enabled }}
      affinity:
        {{- if .Values.affinity  }}
          {{- tpl (toYaml .Values.affinity) $ | nindent 8 }}
        {{- end }}
        {{- if and .Values.podAntiAffinity.enabled (not .Values.affinity.podAntiAffinity) }}
        podAntiAffinity:
          {{- if eq .Values.podAntiAffinity.preset "soft" }}
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 1
              podAffinityTerm:
                topologyKey: {{ .Values.podAntiAffinity.topology }}
                labelSelector:
                  matchLabels:
                    {{- include "unified-views.selectorLabels" . | nindent 20 }}
          {{- else if eq .Values.podAntiAffinity.preset "hard" }}
          requiredDuringSchedulingIgnoredDuringExecution:
            - topologyKey: {{ .Values.podAntiAffinity.topology }}
              labelSelector:
                matchLabels:
                  {{- include "unified-views.selectorLabels" . | nindent 18 }}
          {{- else }}
            {{- fail (printf "Unknown podAntiAffinity preset '%s'" .Values.podAntiAffinity.preset) }}
          {{- end }}
        {{- end }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations: {{- tpl (toYaml .) $ | nindent 8 }}
      {{- end }}
      {{- with .Values.podSecurityContext }}
      securityContext: {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- if or .Values.global.imagePullSecrets .Values.image.pullSecrets }}
      imagePullSecrets:
        {{- include "unified-views.combinedImagePullSecrets" . | nindent 8 }}
      {{- end }}
      initContainers:
        - name: {{ .Chart.Name }}-wait-for-rdf4j
          image: {{ include "unified-views.image" . }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          {{- with .Values.initContainerResources }}
          resources: {{ toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.initContainerDataPermissions.securityContext }}
          securityContext: {{- toYaml . | nindent 12 }}
          {{- end }}
          command: [ "bash", "-c" ]
          env:
            - name: SERVICE_FQDN
              value: '{{ include "rdf4j.service.address" . }}'
          args:
            - |
              sleep 5
              while ! curl --connect-timeout 1 --max-time 2 -f ${SERVICE_FQDN}/rdf4j-server; do
              echo "Waiting for RDF4J Workbench to be ready..."
              sleep 5
              done
              echo "RDF4J Workbench is ready. Sleeping for 5 seconds and proceeding..."
              sleep 5
        {{- if and .Values.persistence.enabled .Values.initContainerDataPermissions.enabled }}
        - name: {{ .Chart.Name }}-provision-data
          image: {{ include "unified-views.image" . }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          env:
            - name: USER_ID
              value: {{ coalesce .Values.securityContext.runAsUser .Values.podSecurityContext.runAsUser | quote }}
            - name: GROUP_ID
              value: {{ coalesce .Values.securityContext.runAsGroup .Values.podSecurityContext.runAsGroup | quote }}
            - name: PROPERTIES_FILE_CHECKSUM
              value: {{ include (print .Template.BasePath "/uv/config-properties.yaml") . | sha256sum }}
            {{- if not ( empty .Values.configuration.rdf4j.passwordSecret.key ) }}
            - name: RDF4J_USER_PASSWORD
              valueFrom:
                secretKeyRef:
                  key: {{ .Values.configuration.rdf4j.passwordSecret.key }}
                  name: {{ .Values.configuration.rdf4j.passwordSecret.name }}
            {{- end }}
            {{- if .Values.configuration.sso.keycloak.enabled }}
            - name: OIDC_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  key: {{ .Values.configuration.sso.keycloak.oidcClientSecret.key }}
                  name: {{ .Values.configuration.sso.keycloak.oidcClientSecret.name }}
            {{- if not ( empty .Values.configuration.sso.keycloak.oidcClientId ) }}
            - name: OIDC_CLIENT_ID
              value: {{ .Values.configuration.sso.keycloak.oidcClientId | quote }}
            {{- end }}
            {{- if not ( empty .Values.configuration.sso.keycloak.oidcClientName ) }}
            - name: OIDC_CLIENT_NAME
              value: {{ .Values.configuration.sso.keycloak.oidcClientName | quote }}
            {{- end }}
            {{- end }}
          volumeMounts:
            - name: {{ .Values.persistence.volumeClaimTemplate.name }}
              mountPath: /unified-views-new
            - name: tomcat
              mountPath: /tomcat
            - name: uv-properties
              mountPath: /tmp/uv/uv.properties
              subPath: uv.properties
          {{- with .Values.initContainerResources }}
          resources: {{ toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.initContainerDataPermissions.securityContext }}
          securityContext: {{- toYaml . | nindent 12 }}
          {{- end }}
          command: [ "bash", "-c" ]
          args:
            - |
              if [[ ! -f /unified-views-new/.initialized-${PROPERTIES_FILE_CHECKSUM} ]] ;then
                echo "Copying data"
                cp -rv /unified-views/* /unified-views-new/
                echo "Done. Parsing and adding properties from /tmp/uv/uv.properties to /unified-views-new/configs/uv.properties"
                while IFS= read -r line; do
                  if echo "$line" | grep "=" > /dev/null; then
                    echo "IN. Reading"
                    IFS="=" read -r key value <<< "$line"
                    echo "READ $key $value"
                    if grep "${key}\s*=" >/dev/null /unified-views-new/configs/uv.properties; then
                      sed -i -e "s|$key\s*=.*|$key=$value|g" /unified-views-new/configs/uv.properties
                    else
                      echo "${key}=${value}" >> /unified-views-new/configs/uv.properties
                    fi
                  fi
                done < /tmp/uv/uv.properties
                if [[ ! -z "${OIDC_CLIENT_SECRET}" ]]; then
                  if grep "oidc.client-secret\s*=" > /dev/null /unified-views-new/configs/uv.properties; then
                    sed -i -e "s|oidc\.client-secret\s*=.*|oidc.client-secret=${OIDC_CLIENT_SECRET}|g" /unified-views-new/configs/uv.properties
                  else
                    echo "oidc.client-secret=${OIDC_CLIENT_SECRET}" >> /unified-views-new/configs/uv.properties
                  fi
                fi

                if [[ ! -z "${RDF4J_USER_PASSWORD}" ]]; then
                  if grep "database.rdf.conf.password\s*=" > /dev/null /unified-views-new/configs/uv.properties; then
                    sed -i -e "s|database\.rdf\.conf\.password\s*=.*|database\.rdf\.conf\.password=${RDF4J_USER_PASSWORD}|g" /unified-views-new/configs/uv.properties
                  else
                    echo "database.rdf.conf.password=${RDF4J_USER_PASSWORD}" >> /unified-views-new/configs/uv.properties
                  fi
                fi
                if [[ ! -z "${OIDC_CLIENT_ID}" ]]; then
                  if grep "oidc.client-id\s*=" > /dev/null /unified-views-new/configs/uv.properties; then
                    sed -i -e "s|oidc\.client-id\s*=.*|oidc\.client-id=${OIDC_CLIENT_ID}|g" /unified-views-new/configs/uv.properties
                  else
                    echo "oidc.client-id=${OIDC_CLIENT_ID}" >> /unified-views-new/configs/uv.properties
                  fi
                fi
                if [[ ! -z "${OIDC_CLIENT_NAME}" ]]; then
                  if grep "oidc.client-name\s*=" > /dev/null /unified-views-new/configs/uv.properties; then
                    sed -i -e "s|oidc\.client-name\s*=.*|oidc\.client-name=${OIDC_CLIENT_NAME}|g" /unified-views-new/configs/uv.properties
                  else
                    echo "oidc.client-name=${OIDC_CLIENT_NAME}" >> /unified-views-new/configs/uv.properties
                  fi
                fi

                echo "Changing ownership to ${USER_ID}:${GROUP_ID}"
                chown -R ${USER_ID}:${GROUP_ID} /unified-views-new/
                rm -f /unified-views-new/.initialized*
                touch /unified-views-new/.initialized-${PROPERTIES_FILE_CHECKSUM}
                echo "Done."
              else
                echo "Volume already initialized"
              fi

              if [[ ! -f /usr/local/tomcat/.initialized ]] ;then
                echo "initializing tomcat volume"
                cp -rvf /usr/local/tomcat/* /tomcat
                touch /tomcat/.initialized
                chown -R ${USER_ID}:${GROUP_ID} /tomcat/
                echo "Done."
              else
                echo "Volume already initialized"
              fi

        {{- end }}
        {{- with .Values.extraInitContainers }}
          {{- toYaml . | nindent 8 }}
        {{- end }}
      containers:
        - name: {{ .Chart.Name }}
          image: {{ include "unified-views.image" . }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          {{- with .Values.command }}
          command: {{ toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.args }}
          args: {{ toYaml . | nindent 12 }}
          {{- end }}
          ports:
            - name: http
              containerPort: {{ .Values.containerPorts.http }}
            {{- with .Values.extraContainerPorts }}
              {{- toYaml . | nindent 12 }}
            {{- end }}
          envFrom:
            - configMapRef:
                name: {{ include "unified-views.fullname.configmap.environment" . }}
            {{- with .Values.extraEnvFrom }}
              {{- tpl (toYaml .) $ | nindent 12 }}
            {{- end }}
          {{- with .Values.extraEnv }}
          env: {{- tpl (toYaml .) $ | nindent 12 }}
          {{- end }}
          volumeMounts:
            - name: {{ .Values.persistence.volumeClaimTemplate.name }}
              mountPath: /unified-views
            - name: tomcat
              mountPath: /usr/local/tomcat
            - name: temp-dir
              mountPath: /tmp
            {{- if .Values.license.existingSecret }}
            - name: uv-license
              mountPath: /unified-views/license
              readOnly: {{ .Values.license.readOnly }}
            {{- end }}
            {{- if .Values.configuration.logback.existingConfigmap }}
            - name: unifiedviews-logback-config
              mountPath: /unified-views/configs/logback.xml
              subPath: {{ .Values.configuration.logback.configmapKey }}
            {{- end }}
            {{- with .Values.extraVolumeMounts }}
              {{- tpl (toYaml .) $ | nindent 12 }}
            {{- end }}
          {{- with .Values.resources }}
          resources: {{ toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.securityContext }}
          securityContext: {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.startupProbe }}
          startupProbe: {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.readinessProbe }}
          readinessProbe: {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.livenessProbe }}
          livenessProbe: {{- toYaml . | nindent 12 }}
          {{- end }}
        {{- with .Values.extraContainers }}
          {{ tpl (toYaml .) $ | nindent 8 }}
        {{- end }}
