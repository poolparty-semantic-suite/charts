apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "unified-views.fullname.configmap.properties" . }}
  namespace: {{ include "unified-views.namespace" . }}
  labels:
    {{- include "unified-views.labels" . | nindent 4 }}
  {{- with .Values.annotations }}
  annotations:
    {{- tpl (toYaml .) $ | nindent 4 }}
  {{- end }}
data:
  uv.properties: |-
    {{- if not (empty .Values.configuration.rdf4j.url) }}
    database.rdf.conf.url={{ .Values.configuration.rdf4j.url }}
    {{- else }}
    database.rdf.conf.url={{ include "rdf4j.service.address" . }}
    {{- end }}
    {{- if not ( empty .Values.configuration.rdf4j.platform) }}
    database.rdf.platform={{ .Values.configuration.rdf4j.platform }}
    {{- end }}
    {{- if not ( empty .Values.configuration.rdf4j.repositoryName ) }}
    database.rdf.conf.repository={{ .Values.configuration.rdf4j.repositoryName }}
    {{- end }}
    {{- if not ( empty .Values.configuration.rdf4j.user) }}
    database.rdf.conf.user={{ .Values.configuration.rdf4j.user }}
    {{- end }}
    {{- if .Values.configuration.sso.keycloak.enabled -}}
    {{- $keycloakUrl := trimSuffix "/" .Values.configuration.sso.keycloak.url -}}
    {{- $realm := required "A Keycloak realm is required when the SSO is enabled." .Values.configuration.sso.keycloak.realm }}
    oidc.enabled=true
    oidc.authorization-uri={{ $keycloakUrl }}/realms/{{ $realm }}/protocol/openid-connect/auth
    oidc.token-uri={{ $keycloakUrl }}/realms/{{ $realm }}/protocol/openid-connect/token
    oidc.user-info-uri={{ $keycloakUrl }}/realms/{{ $realm }}/protocol/openid-connect/userinfo
    oidc.jwk-set-uri={{ $keycloakUrl }}/realms/{{ $realm }}/protocol/openid-connect/certs
    oidc.logout-uri={{ $keycloakUrl }}/realms/{{ $realm }}/protocol/openid-connect/logout
    oidc.admin.roles={{ join "," .Values.configuration.sso.keycloak.adminRoles }}
    # This comment acts as workaround. There is something funny with our replacing logic which ignores the last property.
    {{- end }}
    {{- if .Values.configuration.properties }}
    ##### Overrides from values.yaml #####
      {{- range $key, $val := .Values.configuration.properties -}}
        {{- if eq $key "database.rdf.conf.url" -}}
          {{- fail "Please use 'configuration.rdf4j.url' to provide the RDF4J URL!" -}}
        {{- end -}}
        {{- if ne $val nil -}}
          {{ $key | nindent 4 }}={{ tpl ($val | toString) $ }}
        {{- end -}}
      {{- end -}}
    {{- end -}}
