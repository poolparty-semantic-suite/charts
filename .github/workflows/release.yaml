#
# A release pipeline, which is automatically triggered when there is a chart with changed version.
# It is triggered, after a Pull Request is merged into the default (main) branch and contains changes of the version of
# specific chart or charts.
# 
# If multiple charts versions are updated, the pipeline will trigger for each of the charts in order to release them.
#
# See chart-releaser-action for more information on where and how the charts are released and distributed.
#

name: Release Charts

on:
  push:
    branches:
      - main
      - releases/**

jobs:
  release:
    permissions:
      contents: write

    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8
        with:
          fetch-depth: 0

      - name: Configure Git
        run: |
          git config user.name "$GITHUB_ACTOR"
          git config user.email "$GITHUB_ACTOR@users.noreply.github.com"

      - name: Run chart-releaser
        uses: helm/chart-releaser-action@cae68fefc6b5f367a0275617c9f83181ba54714f
        with:
          charts_dir: "."
          skip_existing: true
        env:
          CR_TOKEN: "${{ secrets.GITHUB_TOKEN }}"
